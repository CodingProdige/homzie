name: Deploy Homzie

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check deploy build environment
        env:
          HOMZIE_ENV_FILE: /mnt/c/Homzie/config/homzie.env
        run: |
          node --version
          test -f "$HOMZIE_ENV_FILE"
          node --env-file="$HOMZIE_ENV_FILE" -e "console.log('DATABASE_URL loaded:', Boolean(process.env.DATABASE_URL)); console.log('APP_URL loaded:', Boolean(process.env.APP_URL || process.env.AUTH_URL));"

      - name: Build
        env:
          HOMZIE_ENV_FILE: /mnt/c/Homzie/config/homzie.env
        run: node --env-file="$HOMZIE_ENV_FILE" ./node_modules/next/dist/bin/next build

      - name: Migrate database
        env:
          HOMZIE_ENV_FILE: /mnt/c/Homzie/config/homzie.env
        run: node --env-file="$HOMZIE_ENV_FILE" scripts/migrate.mjs

      - name: Deploy containers
        env:
          HOMZIE_ENV_FILE: /mnt/c/Homzie/config/homzie.env
        run: docker compose --env-file "$HOMZIE_ENV_FILE" -p homzie_selfhost --profile selfhost --profile tunnel up --build -d
