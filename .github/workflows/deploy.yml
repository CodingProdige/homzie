name: Deploy Homzie

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy self-hosted stack
        env:
          HOMZIE_ENV_FILE: /mnt/c/Homzie/config/homzie.env
        run: node --env-file=/mnt/c/Homzie/config/homzie.env scripts/deploy-selfhost.mjs
