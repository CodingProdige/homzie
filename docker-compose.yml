x-homzie-build-args: &homzie-build-args
  APP_URL: ${APP_URL:-}
  AUTH_SECRET: ${AUTH_SECRET:-}
  AUTH_URL: ${AUTH_URL:-}
  DATABASE_URL: ${DATABASE_URL}
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
  NEXTAUTH_URL: ${NEXTAUTH_URL:-}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homzie}
      POSTGRES_USER: ${POSTGRES_USER:-homzie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homzie-local-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - homzie_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - homzie_redis_data:/data

  web:
    profiles:
      - selfhost
    build:
      context: .
      dockerfile: Dockerfile
      args: *homzie-build-args
    restart: unless-stopped
    env_file:
      - ${HOMZIE_ENV_FILE:-/mnt/c/Homzie/config/homzie.env}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      MEDIA_ROOT: /data/media
      MEDIA_STORAGE_PATH: /data/media
      VIDEO_STORAGE_PATH: /data/media/videos
      THUMBNAIL_STORAGE_PATH: /data/media/thumbnails
      EXPORT_STORAGE_PATH: /data/media/exports
      BACKUP_STORAGE_PATH: /data/media/backups
    expose:
      - "3000"
    volumes:
      - /mnt/c/Homzie/storage/media:/data/media
      - /mnt/c/Homzie/storage/videos:/data/media/videos
      - /mnt/c/Homzie/storage/thumbnails:/data/media/thumbnails
      - /mnt/c/Homzie/storage/exports:/data/media/exports
      - /mnt/c/Homzie/storage/backups:/data/media/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    profiles:
      - selfhost
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args: *homzie-build-args
    restart: unless-stopped
    env_file:
      - ${HOMZIE_ENV_FILE:-/mnt/c/Homzie/config/homzie.env}
    environment:
      NODE_ENV: production
      MEDIA_ROOT: /data/media
      MEDIA_STORAGE_PATH: /data/media
      VIDEO_STORAGE_PATH: /data/media/videos
      THUMBNAIL_STORAGE_PATH: /data/media/thumbnails
      EXPORT_STORAGE_PATH: /data/media/exports
      BACKUP_STORAGE_PATH: /data/media/backups
    volumes:
      - /mnt/c/Homzie/storage/media:/data/media
      - /mnt/c/Homzie/storage/videos:/data/media/videos
      - /mnt/c/Homzie/storage/thumbnails:/data/media/thumbnails
      - /mnt/c/Homzie/storage/exports:/data/media/exports
      - /mnt/c/Homzie/storage/backups:/data/media/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    profiles:
      - selfhost
    image: caddy:2-alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - homzie_caddy_data:/data
      - homzie_caddy_config:/config
      - /mnt/c/Homzie/storage/media:/data/media:ro
      - /mnt/c/Homzie/storage/videos:/data/media/videos:ro
      - /mnt/c/Homzie/storage/thumbnails:/data/media/thumbnails:ro
      - /mnt/c/Homzie/storage/exports:/data/media/exports:ro
    depends_on:
      - web

  cloudflared:
    profiles:
      - tunnel
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

volumes:
  homzie_postgres_data:
  homzie_redis_data:
  homzie_caddy_data:
  homzie_caddy_config:
